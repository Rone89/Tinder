name: Build Unsigned IPA

on: [push]

env:
  # 消除 Node.js 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project PhotoTinder.xcodeproj \
            -scheme PhotoTinder \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # 自动寻找编译出的 .app 文件并移动到 Payload 文件夹
          cp -r build/Release-iphoneos/PhotoTinder.app Payload/ 2>/dev/null || cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/PhotoTinder.app Payload/
          zip -r PhotoTinder_Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-IPA
          path: PhotoTinder_Unsigned.ipa